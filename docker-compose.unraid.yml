services:
  xmessenger:
    image: ghcr.io/bigrg02/xmessenger:latest
    container_name: xmessenger
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /mnt/user/appdata/xmessenger/characters:/app/characters
      - /mnt/user/appdata/xmessenger/data:/app/data
    env_file:
      - /mnt/user/appdata/xmessenger/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
