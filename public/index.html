<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>xMessage</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- ============ CHARACTER LIST SCREEN ============ -->
  <div id="screen-list" class="screen active">
    <header class="list-header">
      <h1>Messages</h1>
      <button class="icon-btn" id="btn-edit" aria-label="Edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </header>
    <div class="search-bar">
      <div class="search-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" placeholder="Search" id="search-input">
      </div>
    </div>
    <div id="character-list"></div>
  </div>

  <!-- ============ CHAT SCREEN ============ -->
  <div id="screen-chat" class="screen">
    <header class="chat-header">
      <button class="back-btn" id="btn-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span class="back-label">Messages</span>
      </button>
      <div class="chat-header-center" id="chat-header-info">
        <div class="chat-avatar-wrap">
          <img id="chat-avatar" src="" alt="" class="chat-avatar">
          <span class="online-dot" id="online-dot"></span>
        </div>
        <div class="chat-header-name" id="chat-header-name"></div>
      </div>
      <div class="chat-header-right">
        <button class="icon-btn" id="btn-video" aria-label="Video">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 10l4.553-2.553A1 1 0 0 1 21 8.382v7.236a1 1 0 0 1-1.447.894L15 14v-4zm-12 0a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4z"/></svg>
        </button>
      </div>
    </header>

    <!-- Phase indicator -->
    <div id="phase-badge" class="phase-badge hidden">
      <span id="phase-badge-text">Device Mode</span>
    </div>

    <!-- Messages -->
    <div id="message-list" class="message-list">
      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area" id="input-area">
      <div class="input-row">
        <button class="circle-btn" id="btn-camera" aria-label="Camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <div class="text-input-wrap" id="text-input-wrap">
          <input type="text" id="message-input" placeholder="iMessage" autocomplete="off" autocorrect="on" enterkeyhint="send">
          <button class="emoji-btn" id="btn-emoji" aria-label="Emoji">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
        </div>
        <button class="send-btn hidden" id="btn-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
        <button class="circle-btn mic-btn" id="btn-mic" aria-label="Voice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>

      <!-- PTT button (device phase only) -->
      <div id="ptt-area" class="ptt-area hidden">
        <button id="btn-ptt" class="ptt-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span>Hold to Talk</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ============ ALWAYS-VISIBLE STOP BUTTON ============ -->
  <button id="stop-btn" class="stop-btn hidden" aria-label="Emergency Stop">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    <span>STOP</span>
  </button>

  <!-- Image lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-close">&times;</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/ptt.js"></script>
</body>
</html>
